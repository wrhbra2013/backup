name: Update Trends Data

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch trends
        run: python3 fetch-trends.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ferramentas/data/trends.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TERMS=$(python3 -c "import json; d=json.load(open('ferramentas/data/trends.json')); print(len(d.get('terms',[])))")
            git commit -m "data: trends update — $TERMS terms [skip ci]"
            git push
          fi
