name: Auto-update docs

on:
  push:
    paths:
      - '**.sh'
      - 'ferramentas/*.html'
      - 'generate-docs.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate docs
        run: python3 generate-docs.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            SH_COUNT=$(find . -name "*.sh" -not -path "./.git/*" -not -path "./docs/*" | wc -l)
            TOOL_COUNT=$(find ./ferramentas -name "*.html" 2>/dev/null | wc -l)
            git commit -m "docs: auto-update — $SH_COUNT scripts, $TOOL_COUNT tools [skip ci]"
            git push
          fi
